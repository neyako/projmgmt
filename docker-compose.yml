services:
  app:
    image: ghcr.io/neyako/projmgmt:latest
    build:
      context: .
      args:
        NEXT_PUBLIC_NAS_IP: ${NEXT_PUBLIC_NAS_IP:-}
        NEXT_PUBLIC_NAS_SHARE: ${NEXT_PUBLIC_NAS_SHARE:-}
        NEXT_PUBLIC_NAS_ROOT_DIR: ${NEXT_PUBLIC_NAS_ROOT_DIR:-}
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: file:../data/projmgmt.db
      PRISMA_DB_PUSH: ${PRISMA_DB_PUSH:-true}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?Set NEXTAUTH_SECRET before starting Docker}
      NEXT_PUBLIC_NAS_IP: ${NEXT_PUBLIC_NAS_IP:-}
      NEXT_PUBLIC_NAS_SHARE: ${NEXT_PUBLIC_NAS_SHARE:-}
      NEXT_PUBLIC_NAS_ROOT_DIR: ${NEXT_PUBLIC_NAS_ROOT_DIR:-}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-}
      TIKTOK_RAPIDAPI_HOST: ${TIKTOK_RAPIDAPI_HOST:-}
      TIKTOK_RAPIDAPI_KEY: ${TIKTOK_RAPIDAPI_KEY:-}
      NEXTCLOUD_URL: ${NEXTCLOUD_URL:-}
      NEXTCLOUD_USER: ${NEXTCLOUD_USER:-}
      NEXTCLOUD_PASSWORD: ${NEXTCLOUD_PASSWORD:-}
    volumes:
      - projmgmt-data:/app/data
      - projmgmt-avatars:/app/public/avatars

volumes:
  projmgmt-data:
  projmgmt-avatars:
